<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" fill="none" role="img" aria-label="Bayesian optimization exploring a multimodal surface and converging to the global optimum">
  <defs>
    <radialGradient id="peakG" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peakL" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- search domain -->
  <rect x="60" y="34" width="600" height="172" rx="8" stroke="#94A3B8" stroke-opacity="0.3"/>

  <!-- objective surface: soft peaks -->
  <ellipse cx="500" cy="98" rx="120" ry="86" fill="url(#peakG)"/>
  <ellipse cx="210" cy="150" rx="78" ry="56" fill="url(#peakL)"/>

  <!-- contour lines (topographic) -->
  <g fill="none" stroke-linecap="round">
    <g stroke="#FBBF24" stroke-opacity="0.55">
      <ellipse cx="500" cy="98" rx="18" ry="13"/>
      <ellipse cx="500" cy="98" rx="40" ry="28"/>
      <ellipse cx="500" cy="98" rx="66" ry="46"/>
      <ellipse cx="500" cy="98" rx="96" ry="67"/>
    </g>
    <g stroke="#22D3EE" stroke-opacity="0.45">
      <ellipse cx="210" cy="150" rx="15" ry="11"/>
      <ellipse cx="210" cy="150" rx="34" ry="25"/>
      <ellipse cx="210" cy="150" rx="55" ry="40"/>
    </g>
  </g>

  <!-- BO sample points: explore, then exploit toward the global optimum -->
  <g fill="#A78BFA" filter="url(#glow)">
    <circle cx="120" cy="175"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.05;0.06;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.05;0.06;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="330" cy="60"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.13;0.14;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.13;0.14;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="612" cy="92"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.21;0.22;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.21;0.22;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="210" cy="150"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.29;0.30;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.29;0.30;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="452" cy="152"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.37;0.38;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.37;0.38;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="566" cy="112"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.46;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.46;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="470" cy="80"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.53;0.54;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.53;0.54;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="516" cy="108"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.61;0.62;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.61;0.62;0.95;1" values="0;0;1;1;0"/></circle>
    <circle cx="504" cy="90"><animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.69;0.70;0.95;1" values="0;0;5;5;0"/><animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.69;0.70;0.95;1" values="0;0;1;1;0"/></circle>
  </g>

  <!-- global optimum found -->
  <circle cx="500" cy="98" r="5.5" fill="#FBBF24" filter="url(#glow)">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.76;0.78;0.95;1" values="0;0;1;1;0"/>
  </circle>
  <circle cx="500" cy="98" fill="none" stroke="#FBBF24" stroke-width="2">
    <animate attributeName="r" dur="8s" repeatCount="indefinite" keyTimes="0;0.77;0.85;0.95;1" values="6;6;28;28;28"/>
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.77;0.85;0.95;1" values="0;0.9;0;0;0"/>
  </circle>

  <!-- labels -->
  <text x="64" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94A3B8">Bayesian optimization</text>
  <text x="500" y="84" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#94A3B8">x*</text>
  <text x="656" y="26" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#94A3B8" fill-opacity="0.85">explore → exploit</text>
</svg>
